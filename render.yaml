services:
  - type: web
    name: agentic-ai-api
    runtime: docker
    dockerfilePath: ./Dockerfile.prod
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      # App
      - key: APP_ENV
        value: prod
      - key: LOG_LEVEL
        value: INFO
      # Database (Neon)
      - key: DATABASE_URL
        fromDatabase:
          name: agentic-db
          property: connectionString
      # Redis (Upstash)
      - key: REDIS_URL
        sync: false
      # Secrets — set these in the Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # File storage — Cloudflare R2 (optional, falls back to local)
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ENDPOINT_URL
        sync: false
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --worker-class uvicorn.workers.UvicornWorker

# Neon external postgres — linked above
databases:
  - name: agentic-db
    databaseName: agentic
    plan: free
    postgresMajorVersion: "16"

# No Celery background worker needed — using FastAPI BackgroundTasks
